# AgentCore deployment config. Auto-populated on first `agentcore launch`.
# Delete account-specific fields (execution_role, ecr_repository, agent_arn)
# if deploying to a different AWS account.
default_agent: maritime_risk
agents:
  maritime_risk:
    name: maritime_risk
    language: python
    entrypoint: src/maritime_risk/orchestrator.py
    deployment_type: container
    aws:
      execution_role_auto_create: true
      ecr_auto_create: true
      s3_auto_create: true
      region: ap-southeast-1
      network_configuration:
        network_mode: PUBLIC
      protocol_configuration:
        server_protocol: AGUI
      observability:
        enabled: true
    memory:
      mode: NO_MEMORY
